    - name: carrefinho
      url-base: https://github.com/carrefinho
    - name: janpfischer
      url-base: https://github.com/janpfischer
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: v0.1-branch
      import: app/west.yml
    - name: prospector-zmk-module
      remote: carrefinho
      revision: main
      groups:
        - dongle
    - name: zmk-dongle-screen
      remote: janpfischer
      revision: main
      groups:
        - dongle
  self:
    path: config
