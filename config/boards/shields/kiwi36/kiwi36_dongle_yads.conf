CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_SLEEP=n
# Uncomment if sleep is enabled
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000
# Make the dongle broadcast with more power
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_STUDIO=y

# kiwi36.conf (base keyboard conf) enables the built-in ZMK display widgets and
# forces ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y for the split halves.
# The dongle_screen module provides its own implementations of these same widgets,
# so the ZMK built-in versions must be disabled here to avoid duplicate symbol
# linker errors.  dongle_screen's Kconfig.defconfig then selects CUSTOM screen.
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=n
CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=n
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=n
CONFIG_ZMK_WIDGET_LAYER_STATUS=n
CONFIG_ZMK_WIDGET_WPM_STATUS=n

CONFIG_DONGLE_SCREEN_HORIZONTAL=y
CONFIG_DONGLE_SCREEN_FLIPPED=n
CONFIG_DONGLE_SCREEN_AMBIENT_LIGHT=n
CONFIG_DONGLE_SCREEN_IDLE_TIMEOUT_S=300
CONFIG_DONGLE_SCREEN_MAX_BRIGHTNESS=90
CONFIG_DONGLE_SCREEN_MIN_BRIGHTNESS=10
CONFIG_DONGLE_SCREEN_DEFAULT_BRIGHTNESS=80
#CONFIG_DONGLE_SCREEN_BRIGHTNESS_KEYBOARD_CONTROL=y
#CONFIG_DONGLE_SCREEN_BRIGHTNESS_UP_KEYCODE=115
#CONFIG_DONGLE_SCREEN_BRIGHTNESS_DOWN_KEYCODE=114
CONFIG_DONGLE_SCREEN_BRIGHTNESS_STEP=5